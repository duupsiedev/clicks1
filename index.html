<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CASCADE // CLICKER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #050508;
    --panel: #0d0d18;
    --border: #2a2a45;
    --cyan: #00f5ff;
    --magenta: #ff00aa;
    --yellow: #f5c400;
    --green: #00ff88;
    --orange: #ff8800;
    --dim: #6060a0;
    --text: #e0e0ff;
    --glow-c: 0 0 8px #00f5ff, 0 0 20px #00f5ff44;
    --glow-m: 0 0 8px #ff00aa, 0 0 20px #ff00aa44;
    --glow-o: 0 0 8px #ff8800, 0 0 20px #ff880044;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.012) 2px, rgba(0,245,255,0.012) 4px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    padding: 10px 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, #0a0a1800, #0a0a18ee, #0a0a1800);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.0rem;
    letter-spacing: 0.2em;
    color: var(--cyan);
    text-shadow: var(--glow-c);
  }
  .logo span { color: var(--magenta); text-shadow: var(--glow-m); }

  .save-row { display: flex; gap: 6px; }

  .save-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 6px 10px;
    border: 1px solid var(--dim);
    border-radius: 3px;
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .save-btn:active { border-color: var(--cyan); color: var(--cyan); }
  .save-btn.danger:active { border-color: var(--magenta); color: var(--magenta); }
  .save-btn.saved { border-color: var(--green); color: var(--green); }

  .points-display { display: flex; align-items: baseline; gap: 10px; }

  .points-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: var(--yellow);
    text-shadow: 0 0 12px #f5c40088;
    line-height: 1;
  }

  .pps { font-size: 0.75rem; color: var(--green); letter-spacing: 0.05em; }

  .header-meta {
    display: flex;
    gap: 14px;
    font-size: 0.65rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .bits-display {
    color: var(--magenta);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-shadow: var(--glow-m);
  }

  .oc-display {
    color: var(--orange);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-shadow: var(--glow-o);
  }

  main {
    width: 100%;
    max-width: 680px;
    padding: 12px 10px 40px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .node-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.35s ease both;
  }

  .node-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--bc, #00f5ff), transparent);
    opacity: 0.8;
  }

  .node-top { display: flex; justify-content: space-between; align-items: center; }

  .node-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--bc);
  }

  .node-desc { font-size: 0.62rem; color: var(--dim); }

  .progress-bar-wrap {
    background: #111122;
    border: 1px solid var(--border);
    border-radius: 2px;
    height: 5px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    border-radius: 2px;
    background: var(--bc);
    box-shadow: 0 0 5px var(--bc);
    transition: width 0.1s linear;
  }

  .prod-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--bc);
    text-shadow: 0 0 6px var(--bc);
  }

  .node-stats {
    display: flex;
    gap: 12px;
    font-size: 0.65rem;
    color: var(--dim);
    flex-wrap: wrap;
    align-items: center;
  }
  .node-stats em { color: var(--text); font-style: normal; }

  .multi-badge {
    font-size: 0.65rem;
    color: var(--yellow);
    font-weight: 700;
    text-shadow: 0 0 5px #f5c40088;
  }

  .node-actions { display: flex; gap: 8px; }

  .click-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 14px 0;
    flex: 2;
    border: 1px solid var(--bc);
    border-radius: 5px;
    cursor: pointer;
    background: transparent;
    color: var(--bc);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .click-btn:active { background: var(--bc); color: var(--bg); }

  .multi-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 14px 8px;
    flex: 1;
    border: 1px solid var(--yellow);
    border-radius: 5px;
    cursor: pointer;
    background: transparent;
    color: var(--yellow);
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: none;
  }
  .multi-btn:active:not(:disabled) { background: var(--yellow); color: var(--bg); }
  .multi-btn:disabled { opacity: 0.35; cursor: not-allowed; border-color: var(--dim); color: var(--dim); }

  .special-btn {
    width: 100%;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 12px;
    border-radius: 5px;
    cursor: pointer;
    background: transparent;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    margin-top: 2px;
  }

  .reformat-btn { border: 1px solid var(--magenta); color: var(--magenta); text-shadow: var(--glow-m); }
  .reformat-btn:active:not(:disabled) { background: var(--magenta); color: var(--bg); }

  .overclock-btn { border: 1px solid var(--orange); color: var(--orange); text-shadow: var(--glow-o); }
  .overclock-btn:active:not(:disabled) { background: var(--orange); color: var(--bg); }

  .autobuy-btn { border: 1px solid var(--cyan); color: var(--dim); }
  .autobuy-btn.on { color: var(--cyan); text-shadow: var(--glow-c); box-shadow: inset 0 0 12px #00f5ff22; }
  .autobuy-btn:active:not(:disabled) { background: var(--cyan); color: var(--bg); }

  .special-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--dim); color: var(--dim); text-shadow: none; box-shadow: none; }

  .locked-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.35s ease both;
  }

  .locked-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: var(--dim);
    white-space: nowrap;
  }

  .unlock-prog-wrap {
    flex: 1;
    background: #111122;
    border: 1px solid var(--border);
    border-radius: 2px;
    height: 5px;
    overflow: hidden;
  }

  .unlock-prog {
    height: 100%;
    background: linear-gradient(90deg, var(--magenta), var(--cyan));
    border-radius: 2px;
    transition: width 0.3s ease;
    box-shadow: 0 0 5px var(--magenta);
  }

  .unlock-cost {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.62rem;
    color: var(--magenta);
    text-shadow: var(--glow-m);
    white-space: nowrap;
  }

  .floating-pt {
    position: fixed;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--yellow);
    text-shadow: 0 0 8px #f5c400;
    pointer-events: none;
    animation: floatUp 0.8s ease-out forwards;
    z-index: 999;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-44px); }
  }

  .c0  { --bc: #00f5ff; } .c1  { --bc: #ff00aa; } .c2  { --bc: #f5c400; }
  .c3  { --bc: #00ff88; } .c4  { --bc: #ff6600; } .c5  { --bc: #aa00ff; }
  .c6  { --bc: #00ccff; } .c7  { --bc: #ff3366; } .c8  { --bc: #44ff00; }
  .c9  { --bc: #ff9900; } .c10 { --bc: #00ffcc; } .c11 { --bc: #ff0066; }
  .c12 { --bc: #ccff00; } .c13 { --bc: #0066ff; } .c14 { --bc: #ff6699; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: #0f0f1e;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    padding: 8px 20px;
    border-radius: 4px;
    z-index: 200;
    white-space: nowrap;
    animation: toastIn 0.2s ease, toastOut 0.3s ease 1.8s forwards;
    pointer-events: none;
  }
  @keyframes toastIn  { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">CASCADE<span>//</span>CLICKER</div>
    <div class="save-row">
      <button class="save-btn" id="save-btn" onclick="saveGame()">SAVE</button>
      <button class="save-btn danger" onclick="resetGame()">RESET</button>
    </div>
  </div>
  <div class="points-display">
    <div class="points-value" id="pts">0</div>
    <div class="pps" id="pps">▶ 0.00/s <span class="multi-badge" id="pts-multi-badge" style="display:none"></span></div>
  </div>
  <div class="header-meta">
    <div class="bits-display" id="bits-display"></div>
    <div class="oc-display" id="oc-display"></div>
  </div>
</header>

<main id="main"></main>

<script>
// ══════════════════════════════════════════════
// BIG NUMBER — log10-based to handle e+300+
// ══════════════════════════════════════════════
class Big {
  // Stored as { m: mantissa [1,10), e: exponent }  →  value = m * 10^e
  constructor(v = 0) {
    if (v instanceof Big) { this.m = v.m; this.e = v.e; return; }
    if (v === 0 || !isFinite(v) || isNaN(v)) { this.m = 0; this.e = 0; return; }
    const s = Math.sign(v); v = Math.abs(v);
    this.e = Math.floor(Math.log10(v));
    this.m = s * v / Math.pow(10, this.e);
    this._norm();
  }
  static of(m, e) {
    if (!isFinite(m) || isNaN(m) || !isFinite(e) || isNaN(e)) return new Big(0);
    const b = new Big(0); b.m = m; b.e = e; b._norm(); return b;
  }
  _norm() {
    if (this.m === 0 || isNaN(this.m) || !isFinite(this.m)) { this.m = 0; this.e = 0; return; }
    const s = Math.sign(this.m); const am = Math.abs(this.m);
    if (am >= 10 || am < 1) {
      const d = Math.floor(Math.log10(am));
      this.e += d; this.m = s * am / Math.pow(10, d);
    }
  }
  add(b) {
    b = b instanceof Big ? b : new Big(b);
    if (this.m === 0) return new Big(b);
    if (b.m === 0) return new Big(this);
    if (this.e === b.e) return Big.of(this.m + b.m, this.e);
    if (this.e > b.e) { if (this.e - b.e > 15) return new Big(this); return Big.of(this.m + b.m * Math.pow(10, b.e - this.e), this.e); }
    if (b.e - this.e > 15) return new Big(b);
    return Big.of(b.m + this.m * Math.pow(10, this.e - b.e), b.e);
  }
  sub(b) { b = b instanceof Big ? b : new Big(b); return this.add(Big.of(-b.m, b.e)); }
  mul(b) { b = b instanceof Big ? b : new Big(b); return Big.of(this.m * b.m, this.e + b.e); }
  // mulN: always use log10 to avoid native JS overflow
  mulN(n) {
    if (!isFinite(n) || isNaN(n) || n === 0 || this.m === 0) return new Big(0);
    const an   = Math.abs(n);
    const sign = Math.sign(n) * Math.sign(this.m);
    const logN = Math.log10(an);
    const addE = Math.floor(logN);
    const remM = Math.pow(10, logN - addE);
    return Big.of(sign * Math.abs(this.m) * remM, this.e + addE);
  }
  divN(n) {
    if (!isFinite(n) || isNaN(n) || n === 0) return new Big(0);
    return this.mulN(1 / n);
  }
  gte(b) { b = b instanceof Big ? b : new Big(b); if (this.e !== b.e) return this.e > b.e; return this.m >= b.m; }
  gt(b)  { b = b instanceof Big ? b : new Big(b); if (this.e !== b.e) return this.e > b.e; return this.m > b.m;  }
  floor() { if (this.e < 0) return new Big(0); if (this.e >= 15) return new Big(this); return new Big(Math.floor(this.m * Math.pow(10, this.e))); }
  toNum() {
    const v = this.m * Math.pow(10, this.e);
    return isFinite(v) ? v : this.e > 0 ? Infinity : 0;
  }
  fmt() {
    if (this.m === 0) return '0';
    if (this.e >= 0 && this.e < 3) {
      const v = this.m * Math.pow(10, this.e);
      return isFinite(v) ? (v < 10 ? v.toFixed(2) : Math.round(v).toString()) : `${this.m.toFixed(2)}e+${this.e}`;
    }
    return `${this.m.toFixed(2)}e+${this.e}`;
  }
  static fromSave(o) {
    if (!o) return new Big(0);
    const b = new Big(0);
    b.m = (isFinite(o.m) && !isNaN(o.m)) ? o.m : 0;
    b.e = (isFinite(o.e) && !isNaN(o.e)) ? o.e : 0;
    return b;
  }
  toSave() { return { m: this.m, e: this.e }; }
}

// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const MAX_NODES       = 15;
const BASE_NODES      = 10;
const CLICKS_TO_LEVEL = 10;
const SAVE_KEY        = 'cascade_save_v2';
const MAX_OVERCLOCK   = 10;

const UNLOCK_COSTS = [
  new Big(0), new Big(1e3), new Big(1e6), new Big(1e9), new Big(1e12),
  new Big(1e15), new Big(1e18), new Big(1e21), new Big(1e24), new Big(1e27),
  Big.of(1, 54), Big.of(1, 64), Big.of(1, 75), Big.of(1, 87), Big.of(1, 100)
];

// Base first-purchase costs for boost
const MULTI_BASE_COSTS = [
  new Big(100), new Big(1e4),
  ...Array.from({length:13}, (_,i) => UNLOCK_COSTS[i+2].mulN(10 + (i+2)*10))
];

// Compound rate per node: node i → 1.05 + 0.01*i
function boostCompound(i) { return 1.05 + 0.01 * i; }

// Cost of the nth boost purchase on node i
// cost(n) = base * (1000 * compound)^n
// Using logs: log10(cost) = log10(base) + n * log10(1000 * compound)
function boostCostN(i, n) {
  if (n === 0) return new Big(MULTI_BASE_COSTS[i]);
  const c       = boostCompound(i);
  const base    = MULTI_BASE_COSTS[i];
  const logMult = n * Math.log10(1000 * c); // log10 of the scaling factor
  const newE    = base.e + Math.floor(logMult);
  const newM    = base.m * Math.pow(10, logMult - Math.floor(logMult));
  return Big.of(newM, newE);
}

const OVERCLOCK_COSTS_BITS = Array.from({length: MAX_OVERCLOCK}, (_, i) => 1000 * Math.pow(5, i));

const NAMES = ['NODE-01','NODE-02','NODE-03','NODE-04','NODE-05','NODE-06','NODE-07','NODE-08','NODE-09','NODE-10','NODE-11','NODE-12','NODE-13','NODE-14','NODE-15'];
const DESCS = ['+1 pt/s per level','auto-clicks NODE-01','auto-clicks NODE-02','auto-clicks NODE-03','auto-clicks NODE-04','auto-clicks NODE-05','auto-clicks NODE-06','auto-clicks NODE-07','auto-clicks NODE-08','auto-clicks NODE-09','auto-clicks NODE-10','auto-clicks NODE-11','auto-clicks NODE-12','auto-clicks NODE-13','auto-clicks NODE-14'];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let points = new Big(0);
let pps    = new Big(0);
let bits   = 0;         // bits stay as regular numbers (manageable)
let overclockCount      = 0;
let overclockMultiplier = 1;
let autoBuyOn           = false; // OC2 toggle

const state = Array.from({length: MAX_NODES}, (_, i) => ({
  clicks: 0, levels: 0, autoRate: 0,
  multiplier: 1, multiplierE: 0, multiCount: 0, unlocked: i === 0,
}));

// Get node i's multiplier as a Big
function getMultiBig(i) { return Big.of(state[i].multiplier, state[i].multiplierE); }
// Get incoming multiplier (from node above) as a Big
function getIncomingMultiBig(i) { return (i+1 < MAX_NODES) ? getMultiBig(i+1) : new Big(1); }

const autoAcc = new Array(MAX_NODES).fill(0);
let lastTick = performance.now();
let lastUI   = 0;
let lastSave = 0;

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function availableNodes() { return Math.min(BASE_NODES + overclockCount, MAX_NODES); }
function bitsBonus()      { return 1 + bits * 0.05; }
function overclockBonus() { return Math.max(1, overclockMultiplier); }
function totalBonus()     { return bitsBonus() * overclockBonus(); }

// OC5: overflow — saturated nodes produce ×2
function overflowBonus(i) {
  if (overclockCount < 5) return 1;
  return state[i].autoRate >= 20 ? 2 : 1;
}

function incomingMulti(i) { return (i+1 < MAX_NODES) ? state[i+1].multiplier : 1; } // kept for badge display only
function incomingCount(i) { return (i+1 < MAX_NODES) ? state[i+1].multiCount : 0; }

function effectiveAuto(i) {
  // Display: autoRate × incomingMultiBig × totalBonus
  return getIncomingMultiBig(i).mulN(state[i].autoRate * totalBonus());
}

// ══════════════════════════════════════════════
// GAME LOGIC
// ══════════════════════════════════════════════
function recalcPPS() {
  const bonus = totalBonus();
  // Use Big throughout to avoid overflow in cascade
  const eff = new Array(MAX_NODES).fill(null).map(() => new Big(0));
  const avail = availableNodes();
  for (let i = avail - 1; i >= 1; i--) {
    if (!state[i].unlocked) continue;
    const of5  = overflowBonus(i);
    const own  = getMultiBig(i).mulN(state[i].levels * bonus * of5);
    const auto = eff[i].divN(CLICKS_TO_LEVEL);
    eff[i-1]   = own.add(auto).mulN(CLICKS_TO_LEVEL);
  }
  const auto0 = eff[0].divN(CLICKS_TO_LEVEL);
  const of50  = overflowBonus(0);
  pps = getMultiBig(0).mulN(bonus * of50).mul(new Big(state[0].levels).add(auto0));
}

function gainLevel(i, count = 1) {
  const prevLevels = state[i].levels;
  state[i].levels += count;

  // OC3: every 10 levels grants +1 bonus level (count crossings of multiples of 10)
  let bonus3 = 0;
  if (overclockCount >= 3) {
    bonus3 = Math.floor(state[i].levels / 10) - Math.floor(prevLevels / 10);
    if (bonus3 > 0) state[i].levels += bonus3;
  }

  // autoRate of node below increases by total new levels gained
  if (i > 0) state[i-1].autoRate += count + bonus3;
  recalcPPS();
}

function doClick(i) {
  const s = state[i];
  s.clicks++;
  if (s.clicks >= CLICKS_TO_LEVEL) {
    s.clicks = 0;
    gainLevel(i);
  }
  updateNodeUI(i);
}

function buyMultiplier(i) {
  const cost = boostCostN(i, state[i].multiCount);
  if (!points.gte(cost)) return;
  points = points.sub(cost);
  state[i].multiCount++;
  // Use log2 to avoid Math.pow(2,n) overflow: 2^n = 10^(n*log10(2))
  const log2n  = state[i].multiCount * Math.log10(2);
  state[i].multiplier = Math.pow(10, log2n - Math.floor(log2n)); // mantissa portion
  state[i].multiplierE = Math.floor(log2n);                       // exponent portion
  recalcPPS();
  updateNodeUI(i);
  if (i > 0) updateNodeUI(i-1);
  updateHeader();
}

function tryAutoBuy() {
  if (!autoBuyOn || overclockCount < 2) return;
  const avail = availableNodes();
  for (let i = 0; i < avail; i++) {
    if (!state[i].unlocked) continue;
    const cost = boostCostN(i, state[i].multiCount);
    if (points.gte(cost)) buyMultiplier(i);
  }
}

// OC4: auto bits farming — 0.1% of bits per second
function tickBits(dt) {
  if (overclockCount < 4 || bits <= 0) return;
  bits += bits * 0.001 * dt;
}

// ══════════════════════════════════════════════
// REFORMAT
// ══════════════════════════════════════════════
function calcBitsGained(pts) {
  if (!pts.gte(new Big(1e6))) return 0;
  const log = pts.e + Math.log10(Math.abs(pts.m)) - 6;
  return Math.max(0, Math.floor(log * 5) + 1);
}

function doReformat() {
  const gained = calcBitsGained(points);
  if (gained <= 0) { showToast('NEED 1.00e+6 PTS TO REFORMAT'); return; }
  const actual = Math.floor(gained * overclockBonus());
  if (!confirm(`Reformat? Gain ${actual} BITS (total: ${Math.floor(bits + actual)}, +${Math.floor((bits + actual) * 5)}% production). All node progress resets.`)) return;
  bits += actual;
  softReset();
  saveGame(true);
  showToast(`+${actual} BITS // TOTAL: +${Math.floor(bits * 5)}%`);
}

// ══════════════════════════════════════════════
// OVERCLOCK
// ══════════════════════════════════════════════
function nextOverclockCost() { return OVERCLOCK_COSTS_BITS[overclockCount] ?? Infinity; }

function doOverclock() {
  if (overclockCount >= MAX_OVERCLOCK) { showToast('MAX OVERCLOCK REACHED'); return; }
  const cost = nextOverclockCost();
  if (bits < cost) { showToast(`NEED ${cost.toLocaleString()} BITS`); return; }
  const newOC = overclockCount + 1;
  const newMul = newOC * 2;
  const newNodeMsg = newOC <= 5 ? ` // NODE-${BASE_NODES + newOC} UNLOCKED` : '';
  const bonusMsg = newOC === 2 ? ' // AUTO-BUY UNLOCKED'
    : newOC === 3 ? ' // +1/10 LEVELS UNLOCKED'
    : newOC === 4 ? ' // BIT FARMING UNLOCKED'
    : newOC === 5 ? ' // OVERFLOW UNLOCKED'
    : '';
  if (!confirm(`OVERCLOCK ${newOC}? Costs ${cost.toLocaleString()} BITS. Resets all bits & progress. Gives ×${newMul} to everything permanently.${bonusMsg}`)) return;
  bits -= cost;
  overclockCount = newOC;
  overclockMultiplier = newOC * 2;
  softReset();
  bits = 0;
  saveGame(true);
  showToast(`OC${overclockCount} // ×${overclockMultiplier}${newNodeMsg}${bonusMsg}`);
}

function softReset() {
  points = new Big(0);
  state.forEach((s, i) => {
    s.clicks = 0; s.levels = 0; s.autoRate = 0;
    s.multiplier = 1; s.multiCount = 0; s.unlocked = i === 0;
  });
  autoAcc.fill(0);
  autoBuyOn = false;
  recalcPPS();
  buildUI();
}

// ══════════════════════════════════════════════
// SAVE / LOAD / RESET
// ══════════════════════════════════════════════
function saveGame(silent = false) {
  localStorage.setItem(SAVE_KEY, JSON.stringify({
    points: points.toSave(), bits, overclockCount, overclockMultiplier, autoBuyOn,
    state: state.map(s => ({...s}))
  }));
  if (!silent) {
    const btn = document.getElementById('save-btn');
    btn.textContent = 'SAVED!'; btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'SAVE'; btn.classList.remove('saved'); }, 1500);
    showToast('GAME SAVED');
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    points              = Big.fromSave(d.points);
    bits                = d.bits               || 0;
    overclockCount      = d.overclockCount      || 0;
    overclockMultiplier = Math.max(1, d.overclockMultiplier || 1);
    autoBuyOn           = d.autoBuyOn           || false;
    d.state.forEach((s, i) => {
      if (!state[i]) return;
      state[i].clicks      = s.clicks      ?? 0;
      state[i].levels      = s.levels      ?? 0;
      state[i].autoRate    = s.autoRate    ?? 0;
      state[i].multiplier  = s.multiplier  ?? 1;
      state[i].multiplierE = s.multiplierE ?? 0;
      state[i].multiCount  = s.multiCount  ?? 0;
      state[i].unlocked    = s.unlocked    ?? (i === 0);
    });
    recalcPPS();
    showToast('SAVE LOADED');
  } catch(e) { console.warn('Load failed', e); }
}

function resetGame() {
  if (!confirm('Reset ALL progress including bits and overclock? This cannot be undone.')) return;
  localStorage.removeItem(SAVE_KEY);
  points = new Big(0); bits = 0; overclockCount = 0; overclockMultiplier = 1; autoBuyOn = false;
  state.forEach((s, i) => { s.clicks=0; s.levels=0; s.autoRate=0; s.multiplier=1; s.multiCount=0; s.unlocked=i===0; });
  autoAcc.fill(0);
  recalcPPS();
  buildUI();
  showToast('FULL RESET');
}

function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// ══════════════════════════════════════════════
// BUILD UI
// ══════════════════════════════════════════════
function buildUI() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const avail = availableNodes();

  for (let i = 0; i < avail; i++) {
    const s = state[i];
    const row = document.createElement('div');
    row.id = `row-${i}`;

    if (!s.unlocked) {
      const cost = UNLOCK_COSTS[i];
      row.className = 'locked-bar';
      const prog = points.gte(cost) ? 100 : (points.e >= cost.e - 1 ? (points.toNum() / cost.toNum() * 100) : 0);
      row.innerHTML = `
        <span class="locked-name">${NAMES[i]}</span>
        <div class="unlock-prog-wrap"><div class="unlock-prog" id="uprog-${i}" style="width:${Math.min(prog,100).toFixed(1)}%"></div></div>
        <span class="unlock-cost">${cost.fmt()}</span>
      `;
      main.appendChild(row);
      break;
    }

    row.className = `node-card c${i}`;

    const boostCost  = boostCostN(i, s.multiCount);
    const canAfford  = points.gte(boostCost);
    const multLbl    = s.multiCount > 0 ? `×${fmtMul(i)}` : '×2';
    const boostLbl   = `${multLbl} ${i===0?'pts/s':'auto'} ▸ ${boostCost.fmt()}`;

    const iCount     = incomingCount(i);
    const badge      = `<span class="multi-badge" id="incoming-badge-${i}" style="display:${iCount>0?'':'none'}">×${fmtIncomingMul(i)}</span>`;

    const isNode0 = i === 0;
    const bitsGained  = calcBitsGained(points);
    const actualBits  = Math.floor(bitsGained * overclockBonus());
    const ocCost      = nextOverclockCost();
    const canOC       = overclockCount < MAX_OVERCLOCK;
    const canAutoBuy  = overclockCount >= 2;

    const reformatHtml = isNode0 ? `
      <button class="special-btn reformat-btn" id="reformat-btn" onclick="doReformat()" ${bitsGained<=0?'disabled':''}>
        ${bitsGained > 0 ? `REFORMAT ▸ +${actualBits} BITS` : 'REFORMAT ▸ NEED 1.00e+6'}
      </button>` : '';

    const autoBuyHtml = isNode0 && canAutoBuy ? `
      <button class="special-btn autobuy-btn ${autoBuyOn?'on':''}" id="autobuy-btn" onclick="toggleAutoBuy()">
        AUTO-BUY ×2: ${autoBuyOn ? 'ON' : 'OFF'}
      </button>` : '';

    const overclockHtml = isNode0 ? `
      <button class="special-btn overclock-btn" id="overclock-btn" onclick="doOverclock()" ${(!canOC || bits < ocCost)?'disabled':''}>
        ${!canOC ? 'OVERCLOCK ▸ MAXED' : `OVERCLOCK ${overclockCount+1} ▸ ${ocCost.toLocaleString()} BITS`}
      </button>` : '';

    row.innerHTML = `
      <div class="node-top">
        <span class="node-name">${NAMES[i]}</span>
        <span class="node-desc">${DESCS[i]}</span>
      </div>
      <div class="progress-bar-wrap" id="pbwrap-${i}">
        <div class="progress-bar" id="pb-${i}" style="width:${(s.clicks/CLICKS_TO_LEVEL*100).toFixed(1)}%"></div>
      </div>
      <div class="prod-display" id="prod-${i}" style="display:none"></div>
      <div class="node-stats">
        <span id="clk-stat-${i}">PROG <em id="clk-${i}">${s.clicks}</em>/10</span>
        <span>LVL <em id="lvl-${i}">${fmtN(s.levels)}</em></span>
        <span>AUTO <em id="aut-${i}">${effectiveAuto(i).fmt()}</em>/s ${badge}</span>
      </div>
      <div class="node-actions">
        <button class="multi-btn" id="multi-btn-${i}" onclick="buyMultiplier(${i})" ${canAfford?'':'disabled'}>${boostLbl}</button>
        <button class="click-btn" onclick="handleClick(${i}, event)">CLICK</button>
      </div>
      ${reformatHtml}
      ${autoBuyHtml}
      ${overclockHtml}
    `;
    main.appendChild(row);
  }

  updateHeader();
}

function toggleAutoBuy() {
  if (overclockCount < 2) return;
  autoBuyOn = !autoBuyOn;
  const btn = document.getElementById('autobuy-btn');
  if (btn) { btn.textContent = `AUTO-BUY ×2: ${autoBuyOn?'ON':'OFF'}`; btn.classList.toggle('on', autoBuyOn); }
}

// ══════════════════════════════════════════════
// FORMAT HELPERS
// ══════════════════════════════════════════════
function fmtN(n) {
  // format a plain number in sci notation
  if (n < 1000) return n.toFixed(n < 10 ? 2 : 0);
  return n.toExponential(2);
}

function fmtMul(i) {
  // Format node i's multiplier using Big
  return getMultiBig(i).fmt();
}
function fmtIncomingMul(i) {
  return getIncomingMultiBig(i).fmt();
}

// ══════════════════════════════════════════════
// UPDATE UI
// ══════════════════════════════════════════════
function updateNodeUI(i) {
  const s   = state[i];
  const sat = s.autoRate >= 20;

  const pbWrap = document.getElementById(`pbwrap-${i}`);
  const prodEl = document.getElementById(`prod-${i}`);
  if (pbWrap && prodEl) {
    if (sat) {
      pbWrap.style.display = 'none';
      prodEl.style.display = 'block';
      prodEl.textContent = `⚡ ${effectiveAuto(i).divN(CLICKS_TO_LEVEL).fmt()} lvl/s${overclockCount>=5&&s.autoRate>=20?' ×2OF':''}`;
    } else {
      pbWrap.style.display = 'block';
      prodEl.style.display = 'none';
      const pb = document.getElementById(`pb-${i}`);
      if (pb) pb.style.width = (s.clicks / CLICKS_TO_LEVEL * 100).toFixed(1) + '%';
    }
  }

  const clkStat = document.getElementById(`clk-stat-${i}`);
  const clk     = document.getElementById(`clk-${i}`);
  if (clkStat) clkStat.style.display = sat ? 'none' : '';
  if (!sat && clk) clk.textContent = s.clicks;

  const lvl = document.getElementById(`lvl-${i}`);
  if (lvl) lvl.textContent = fmtN(s.levels);

  const aut = document.getElementById(`aut-${i}`);
  if (aut) aut.textContent = effectiveAuto(i).fmt();

  const multiBtn = document.getElementById(`multi-btn-${i}`);
  if (multiBtn) {
    const cost = boostCostN(i, s.multiCount);
    const lbl  = i === 0 ? 'pts/s' : 'auto';
    const mul  = s.multiCount > 0 ? `×${fmtMul(i)}` : '×2';
    multiBtn.textContent = `${mul} ${lbl} ▸ ${cost.fmt()}`;
    multiBtn.disabled = !points.gte(cost);
  }

  const badge = document.getElementById(`incoming-badge-${i}`);
  if (badge) {
    badge.style.display = incomingCount(i) > 0 ? '' : 'none';
    badge.textContent = `×${fmtIncomingMul(i)}`;
  }

  if (i === 0) {
    const ptsBadge = document.getElementById('pts-multi-badge');
    if (ptsBadge) {
      ptsBadge.style.display = s.multiCount > 0 ? '' : 'none';
      ptsBadge.textContent = `×${fmtMul(0)}`;
    }
  }
}

function updateHeader() {
  document.getElementById('pts').textContent = points.fmt();
  document.getElementById('pps').textContent = `▶ ${pps.fmt()}/s`;
  const bitsEl = document.getElementById('bits-display');
  if (bitsEl) bitsEl.textContent = bits > 0 ? `⬡ ${Math.floor(bits).toLocaleString()} BITS (+${Math.floor(bits*5)}%)` : '';
  const ocEl = document.getElementById('oc-display');
  if (ocEl) ocEl.textContent = overclockCount > 0 ? `⚡ OC${overclockCount} ×${overclockMultiplier}` : '';
}

function updateUnlockProgress() {
  const avail = availableNodes();
  for (let i = 1; i < avail; i++) {
    if (!state[i].unlocked) {
      const el = document.getElementById(`uprog-${i}`);
      if (el) {
        const cost = UNLOCK_COSTS[i];
        const prog = points.gte(cost) ? 100 : (points.e >= cost.e - 1 ? Math.min(100, points.toNum() / cost.toNum() * 100) : 0);
        el.style.width = prog.toFixed(1) + '%';
      }
      break;
    }
  }
}

function checkUnlocks() {
  const avail = availableNodes();
  for (let i = 1; i < avail; i++) {
    if (!state[i].unlocked && points.gte(UNLOCK_COSTS[i])) {
      state[i].unlocked = true;
      buildUI();
      return;
    }
  }
}

function updateSpecialBtns() {
  const rf = document.getElementById('reformat-btn');
  if (rf) {
    const g = calcBitsGained(points);
    const a = Math.floor(g * overclockBonus());
    rf.textContent = g > 0 ? `REFORMAT ▸ +${a} BITS` : 'REFORMAT ▸ NEED 1.00e+6';
    rf.disabled = g <= 0;
  }
  const oc = document.getElementById('overclock-btn');
  if (oc) {
    const cost = nextOverclockCost();
    const can  = overclockCount < MAX_OVERCLOCK;
    oc.textContent = !can ? 'OVERCLOCK ▸ MAXED' : `OVERCLOCK ${overclockCount+1} ▸ ${cost.toLocaleString()} BITS`;
    oc.disabled = !can || bits < cost;
  }
  const ab = document.getElementById('autobuy-btn');
  if (ab) { ab.textContent = `AUTO-BUY ×2: ${autoBuyOn?'ON':'OFF'}`; ab.classList.toggle('on', autoBuyOn); }
}

// ══════════════════════════════════════════════
// CLICK HANDLER
// ══════════════════════════════════════════════
function handleClick(i, event) {
  doClick(i);
  const rect = event.currentTarget.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'floating-pt'; el.textContent = '+1';
  el.style.left = (rect.left + rect.width/2 - 10) + 'px';
  el.style.top  = (rect.top - 8) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ══════════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════════
function gameTick(now) {
  const dt    = (now - lastTick) / 1000;
  lastTick    = now;
  const bonus = totalBonus();
  const avail = availableNodes();

  for (let i = avail - 1; i >= 1; i--) {
    if (!state[i].unlocked) continue;
    const of5  = overflowBonus(i);
    const rate = getMultiBig(i).mulN(state[i].levels * bonus * of5).toNum();
    if (rate === 0 || !isFinite(rate)) continue;
    autoAcc[i] += rate * dt;
    if (autoAcc[i] >= 1) {
      const full = Math.floor(autoAcc[i]);
      autoAcc[i] -= full;
      const s   = state[i-1];
      const tot = s.clicks + full;
      const newLvl = Math.floor(tot / CLICKS_TO_LEVEL);
      s.clicks = tot % CLICKS_TO_LEVEL;
      if (newLvl > 0) {
        gainLevel(i-1, newLvl);
      }
    }
  }

  points = points.add(pps.mulN(dt));

  // OC4 bit farming
  tickBits(dt);

  if (now - lastUI > 100) {
    lastUI = now;
    tryAutoBuy();
    for (let i = 0; i < avail; i++) {
      if (!state[i].unlocked) break;
      updateNodeUI(i);
    }
    updateUnlockProgress();
    checkUnlocks();
    updateSpecialBtns();
  }

  updateHeader();

  if (now - lastSave > 30000) { lastSave = now; saveGame(true); }

  requestAnimationFrame(gameTick);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
loadGame();
buildUI();
updateHeader();
requestAnimationFrame(gameTick);
</script>
</body>
</html>
